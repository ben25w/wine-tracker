<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wine Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Wine Tracker</h1>
            <div class="header-buttons">
                <button id="toggleViewBtn" class="toggle-view-btn" title="Toggle between list and grid view">
                    <span class="view-icon">⊞</span>
                </button>
            </div>
        </header>

        <div class="controls-section">
            <input type="text" id="searchInput" class="search-box" placeholder="Search wines by name…">
            <div class="filter-group">
                <select id="typeFilter" class="filter-select">
                    <option value="">All Types</option>
                </select>
                <select id="countryFilter" class="filter-select">
                    <option value="">All Countries</option>
                </select>
                <select id="sortFilter" class="sort-select">
                    <option value="alpha-az">Name (A–Z)</option>
                    <option value="alpha-za">Name (Z–A)</option>
                    <option value="date-newest">Recently Added</option>
                    <option value="date-oldest">Oldest First</option>
                </select>
            </div>
        </div>

        <button id="addWineBtn" class="add-wine-btn">+ Add Wine</button>

        <div id="wineContainer" class="wine-list"></div>
        <div id="emptyState" class="empty-state" style="display: none;"></div>
    </div>

    <!-- Modal: Add/Edit Wine -->
    <div id="wineModal" class="modal" style="display: none;">
        <div class="modal-content">
            <button class="modal-close" id="modalCloseBtn">&times;</button>
            <h2 id="modalTitle">Add Wine</h2>
            <form id="wineForm">
                <div class="form-group">
                    <label for="wineName">Wine Name *</label>
                    <input type="text" id="wineName" required placeholder="e.g., Côtes de Nuits 2019">
                </div>
                <div class="form-group">
                    <label for="wineType">Type *</label>
                    <div class="type-input-group">
                        <select id="wineType">
                            <option value="">Select type…</option>
                        </select>
                        <button type="button" id="addNewTypeBtn" class="add-type-btn" title="Add new wine type">+</button>
                    </div>
                    <input type="text" id="newTypeInput" class="new-type-input" placeholder="New type name" style="display: none;">
                </div>
                <div class="form-group">
                    <label for="wineCountry">Country</label>
                    <input type="text" id="wineCountry" placeholder="e.g., France">
                </div>
                <div class="form-group">
                    <label for="wineRegion">Region</label>
                    <input type="text" id="wineRegion" placeholder="e.g., Burgundy">
                </div>
                <div class="form-group">
                    <label for="wineNotes">Notes</label>
                    <textarea id="wineNotes" placeholder="Tasting notes, impressions…"></textarea>
                </div>
                <div class="form-group">
                    <label for="winePhoto">Photo</label>
                    <input type="file" id="winePhoto" accept="image/jpeg,image/png,image/webp">
                    <small>JPEG, PNG or WebP — optional</small>
                    <div id="photoPreview" style="display: none; margin-top: 10px;">
                        <img id="previewImg" src="" alt="Preview" style="max-width: 150px; border-radius: 4px;">
                    </div>
                </div>
                <div class="form-buttons">
                    <button type="submit" class="btn btn-primary">Save Wine</button>
                    <button type="button" id="deleteWineBtn" class="btn btn-danger" style="display: none;">Delete</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Wine Detail -->
    <div id="detailModal" class="modal" style="display: none;">
        <div class="modal-content modal-detail">
            <button class="modal-close" id="detailCloseBtn">&times;</button>
            <div id="detailContent"></div>
            <div class="detail-buttons">
                <button id="editWineBtn" class="btn btn-primary">Edit</button>
                <button id="closeDetailBtn" class="btn btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
